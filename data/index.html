<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar LED Controller Dashboard</title>
  <script type="module" crossorigin src="/assets/index-CCpe59yY.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-CfpTxHeq.css">
</head>

<body class="bg-slate-950 text-slate-100 min-h-screen p-4 md:p-8 flex flex-col items-center">

    <div class="w-full max-w-5xl space-y-6 md:space-y-8">

        <header class="text-center space-y-2 py-4 md:py-8">
            <h1
                class="text-3xl md:text-5xl lg:text-6xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-orange-500">
                SOLAR LED CONTROLLER
            </h1>
            <div class="flex items-center justify-center gap-2 mt-2">
                <p class="text-slate-400 text-sm md:text-base font-medium">Dashboard v1.3</p>
                <div id="fw-ver" class="text-slate-400 text-sm md:text-base font-medium">Firmware --</div>
            </div>
            <div id="sys-upt" class="text-slate-400 text-sm md:text-base font-medium">เวลาการทำงานระบบ --</div>
        </header>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6">

            <div
                class="bg-slate-900 border border-slate-800 p-5 md:p-6 rounded-3xl shadow-xl flex flex-col justify-between">
                <span
                    class="text-sm md:text-base font-bold text-slate-500 uppercase tracking-widest">แรงดันแบตเตอรี่</span>
                <div class="flex items-baseline gap-2 mt-2">
                    <div id="v" class="text-2xl md:text-3xl font-black text-yellow-400">-- V</div>
                </div>
            </div>

            <div
                class="bg-slate-900 border border-slate-800 p-5 md:p-6 rounded-3xl shadow-xl flex flex-col justify-center">
                <span class="text-sm md:text-base font-bold text-slate-500 uppercase tracking-widest">อุณหภูมิ</span>
                <div id="t-buck" class="text-2xl md:text-3xl font-bold text-emerald-400 mt-2">-- °C</div>
            </div>

            <div
                class="bg-slate-900 border border-slate-800 p-5 md:p-6 rounded-3xl shadow-xl flex flex-col justify-between">
                <span
                    class="text-sm md:text-base font-bold text-slate-500 uppercase tracking-widest">พัดลมระบายความร้อน</span>
                <div id="fan-status" class="text-2xl md:text-3xl font-black text-blue-400 mt-2">--</div>
            </div>

            <div
                class="bg-slate-900 border border-slate-800 p-5 md:p-6 rounded-3xl shadow-xl flex flex-col justify-between">
                <span class="text-sm md:text-base font-bold text-slate-500 uppercase tracking-widest">สถานะไฟ LED</span>
                <div id="light-status" class="text-2xl md:text-3xl font-black text-orange-400 mt-2">--</div>
            </div>
        </div>

        <section class="bg-slate-900 border border-slate-800 p-6 md:p-8 rounded-3xl shadow-2xl space-y-4 md:space-y-6">
            <h3 class="text-slate-400 text-sm md:text-base font-bold uppercase tracking-widest">ควบคุมการส่องสว่าง</h3>
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 md:gap-4">
                <button onclick="sendCmd('/lighton')"
                    class="py-4 md:py-6 bg-emerald-600 hover:bg-emerald-500 active:scale-95 transition-all rounded-2xl font-bold text-base md:text-lg lg:text-xl shadow-lg shadow-emerald-900/50">💡
                    เปิดไฟ</button>
                <button onclick="sendCmd('/lightoff')"
                    class="py-4 md:py-6 bg-rose-600 hover:bg-rose-500 active:scale-95 transition-all rounded-2xl font-bold text-base md:text-lg lg:text-xl shadow-lg shadow-rose-900/50">🌑
                    ปิดไฟ <br>(กลับโหมดออโต้)</button>
                <button onclick="sendCmd('/log')"
                    class="py-4 md:py-6 bg-amber-600 hover:bg-amber-500 active:scale-95 transition-all rounded-2xl font-bold text-base md:text-lg lg:text-xl shadow-lg shadow-amber-900/50">📝
                    ดูประวัติ Log</button>
            </div>
        </section>

        <section class="bg-slate-900 border border-slate-800 p-6 md:p-8 rounded-3xl shadow-2xl space-y-6">
            <h3 class="text-slate-400 text-sm md:text-base font-bold uppercase tracking-widest mb-4">
                ตั้งเวลาเปิด-ปิดไฟอัตโนมัติ</h3>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-center">
                <div class="space-y-2">
                    <label for="startTime" class="text-base md:text-lg font-semibold text-slate-300">เวลาเปิดไฟ (Start
                        Time):</label>
                    <input type="time" id="startTime"
                        class="w-full bg-slate-800 border border-slate-700 text-slate-100 text-lg rounded-xl focus:ring-emerald-500 focus:border-emerald-500 block p-3">
                </div>

                <div class="space-y-2">
                    <label for="endTime" class="text-base md:text-lg font-semibold text-slate-300">เวลาปิดไฟ (End
                        Time):</label>
                    <input type="time" id="endTime"
                        class="w-full bg-slate-800 border border-slate-700 text-slate-100 text-lg rounded-xl focus:ring-emerald-500 focus:border-emerald-500 block p-3">
                </div>
            </div>

            <div class="flex flex-col sm:flex-row gap-3 md:gap-4 pt-4 border-t border-slate-800">
                <button onclick="saveSchedule(1)"
                    class="flex-1 py-3 bg-blue-600 hover:bg-blue-500 active:scale-95 transition-all rounded-xl font-bold text-base md:text-lg shadow-lg shadow-blue-900/50">
                    💾 บันทึกและเปิดใช้ออโต้
                </button>

                <button onclick="saveSchedule(0)"
                    class="flex-1 py-3 bg-slate-700 hover:bg-slate-600 active:scale-95 transition-all rounded-xl font-bold text-base md:text-lg shadow-lg">
                    ❌ ปิดระบบออโต้
                </button>
            </div>
        </section>
    </div>

    <div id="toast"
        class="fixed bottom-[-100px] left-1/2 -translate-x-1/2 bg-white text-black px-6 md:px-8 py-3 md:py-4 rounded-full font-bold md:text-lg shadow-2xl transition-all duration-500 z-50 whitespace-nowrap">
        Saved!
    </div>

</body>

</html>
