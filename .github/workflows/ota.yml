name: Build and Release Firmware

on:
  push:
    tags:
      - 'v*' # สคริปต์จะทำงานเมื่อคุณสร้าง Tag เช่น v1.0.0, v1.1.0

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Cache PlatformIO
        uses: actions/cache@v3
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-platformio

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install PlatformIO
        run: pip install -U platformio

      - name: Build Firmware
        run: |
          # 1. ดึงชื่อ Tag เช่น v0.0.1 มาเก็บไว้
          VERSION=${GITHUB_REF#refs/tags/}
          
          # 2. ใช้ PLATFORMIO_BUILD_FLAGS เพื่อฉีดตัวแปรเข้าไปในโค้ด C++
          # หมายเหตุ: ต้องใช้การครอบ String ซ้อนกันเพื่อให้ C++ มองเห็นเป็นข้อความจริงๆ
          export PLATFORMIO_BUILD_FLAGS="-D FIRMWARE_VERSION='\"$VERSION\"'"
          
          # 3. สั่ง Build ตามปกติ
          pio run -e esp32doit-devkit-v1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: .pio/build/esp32doit-devkit-v1/firmware.bin
          name: Release ${{ github.ref_name }}
          body: "Auto-generated release for version ${{ github.ref_name }}"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
